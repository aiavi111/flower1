<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Flower Shop</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">🌸</div>
      <div>
        <div class="title">Flower Shop</div>
        <div class="subtitle">нежно-розовый каталог</div>

  <!-- ВАЖНО: подключаем JS ПОСЛЕ блока products -->

</html>
